# Two-phase staged fine-tuning:
#   phase 1 (base): train on all buckets with SAFE legal only (forgetting filter)
#   phase 2 (hard_refine): low-LR pass on the RISKY legal tail + small retrieval ballast,
#                          initialized from phase 1
phases:
  - name: base
    data:
      buckets:
        legal: {forgetting: {mode: filter, threshold: 0.0}}
    train: {epochs: 2, lr: 2.0e-4}
  - name: hard_refine
    init_from: PREV
    data:
      buckets:
        legal:          {forgetting: {mode: keep_risky, threshold: 0.0}}
        retrieval:      {limit: 2000, shuffle: true}
        sts:            {enabled: false}
        classification: {enabled: false}
      real_nli: {enabled: false}
    train: {epochs: 1, lr: 2.0e-5}
output_dir: ./runs/staged
