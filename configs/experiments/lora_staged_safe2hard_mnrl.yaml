# R9 | LoRA | two-stage: phase1 all-synth+safe-legal, phase2 low-LR risky-legal tail | mnrl
# Purpose: two-stage arm (vs single-stage champion R5).
phases:
  - name: base
    data:
      buckets:
        legal: {forgetting: {mode: filter, threshold: 0.0}}
    train: {epochs: 2, lr: 2.0e-4}
  - name: hard_refine
    init_from: PREV
    data:
      buckets:
        legal:          {forgetting: {mode: keep_risky, threshold: 0.0}}
        retrieval:      {limit: 2000, shuffle: true}
        sts:            {enabled: false}
        classification: {enabled: false}
      real_nli: {enabled: false}
    train: {epochs: 1, lr: 2.0e-5}
output_dir: ./runs/lora_staged_safe2hard_mnrl
